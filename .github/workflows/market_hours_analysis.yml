name: Daily Market Hours Analysis

on:
  schedule:
    # 매일 한국 시간 07:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 지원

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Hours Analysis
        env:
          MONGO_DB_CONNECTION_STRING: ${{ secrets.MONGO_DB_CONNECTION_STRING }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python scripts/analyze_market_hours.py --slack

      - name: Notify Slack on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.LOGS_SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: "❌ GitHub Action Failed: ${{ github.workflow }}"
          SLACK_MESSAGE: "Market Hours Analysis failed! View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
