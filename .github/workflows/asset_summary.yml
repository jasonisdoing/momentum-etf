name: Daily Asset Summary

on:
  schedule:
    # 매일 한국 시간 08:00, 13:00, 16:00 (UTC 23:00, 04:00, 07:00)
    - cron: '0 23,4,7 * * *'
  workflow_dispatch: # 수동 실행 지원

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send Slack Asset Summary
        env:
          MONGO_DB_CONNECTION_STRING: ${{ secrets.MONGO_DB_CONNECTION_STRING }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/slack_asset_summary.py

      - name: Notify Slack on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.LOGS_SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: "❌ GitHub Action Failed: ${{ github.workflow }}"
          SLACK_MESSAGE: "Job failed in ${{ github.repository }}! View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
