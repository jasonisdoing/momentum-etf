name: Build & Deploy to Oracle VM

on:
  push:
    branches:
      - upgrade   # upgrade 브랜치에 push 시 자동 배포

env:
  REGISTRY: ghcr.io
  IMAGE_FASTAPI: ghcr.io/${{ github.repository_owner }}/momentum-etf-fastapi
  IMAGE_NODE: ghcr.io/${{ github.repository_owner }}/momentum-etf-node

jobs:
  build-and-push:
    # 서버(Oracle Ampere A1, ARM64) 네이티브 빌드 — 무료 ARM 러너 사용
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push fastapi image (linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.fastapi
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_FASTAPI }}:latest
            ${{ env.IMAGE_FASTAPI }}:${{ github.sha }}
          cache-from: type=gha,scope=fastapi-arm64
          cache-to: type=gha,mode=max,scope=fastapi-arm64

      - name: Build & push node image (linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NODE }}:latest
            ${{ env.IMAGE_NODE }}:${{ github.sha }}
          cache-from: type=gha,scope=node-arm64
          cache-to: type=gha,mode=max,scope=node-arm64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM (pull & up)
        uses: appleboy/ssh-action@master
        timeout-minutes: 10
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USERNAME }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          timeout: 60s
          command_timeout: 8m
          script: |
            set -euo pipefail
            echo ">>> Connecting to Oracle VM and starting deployment..."
            cd ~/apps/momentum-etf
            export COMPOSE_PARALLEL_LIMIT=1
            # 배포 진행 플래그 — fastapi_app 컨테이너 안에서 헬퍼 스크립트 실행.
            sudo docker compose exec -T -w /app fastapi_app env PYTHONPATH=/app python infra/cron/deploy_flag_set.py \
              || echo ">>> deploy 플래그 설정 실패 (계속 진행)"
            # 어떤 경로로 빠져나가도 플래그는 반드시 제거
            trap 'cd $HOME/apps/momentum-etf && sudo docker compose exec -T -w /app fastapi_app env PYTHONPATH=/app python infra/cron/deploy_flag_clear.py || true' EXIT
            # stale rename 유령 컨테이너 선별 제거
            sudo docker ps -a --format '{{.ID}} {{.Names}}' \
              | awk '$2 ~ /^[0-9a-f]{12}_momentum-etf-/ { print $1 }' \
              | xargs -r sudo docker rm -f
            # docker-compose.yml / infra/cron / nginx 등 설정 파일 갱신
            if [ ! -d .git ]; then
              git clone https://github.com/jasonisdoing/momentum-etf.git .
            else
              git fetch origin upgrade
              git reset --hard origin/upgrade
            fi
            # GHCR 이미지도 순차로 받는다. A1 1 OCPU에서는 병렬 pull/압축 해제가 배포 중 CPU 피크를 만든다.
            sudo docker compose pull fastapi_app
            sudo docker compose pull node_app
            # 앱 서비스만 순차 교체한다. MongoDB는 배포마다 건드리지 않는다.
            sudo docker compose up -d --no-deps fastapi_app
            for i in $(seq 1 30); do
              if sudo docker compose exec -T fastapi_app python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/internal/health', timeout=2)" >/dev/null 2>&1; then
                echo ">>> fastapi_app health check passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "fastapi_app health check failed" >&2
                sudo docker compose logs --tail=80 fastapi_app >&2
                exit 1
              fi
              sleep 1
            done
            sudo docker compose up -d --no-deps node_app
            for i in $(seq 1 30); do
              if sudo docker compose exec -T node_app node -e "fetch('http://127.0.0.1:3000/api/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" >/dev/null 2>&1; then
                echo ">>> node_app live check passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "node_app live check failed" >&2
                sudo docker compose logs --tail=80 node_app >&2
                exit 1
              fi
              sleep 1
            done
            sudo docker compose up -d --no-deps hybrid_proxy
            # 이미지 정리는 배포 중 CPU/디스크 I/O 피크를 만들기 때문에 배포 경로에서는 실행하지 않는다.
            # ⚠️ VM cron 자동 설치 비활성화. 모든 momentum-etf 자동 배치는 로컬(Mac) 의
            # run_local_scheduler.py 에서 실행되므로 VM crontab 에 항목을 두지 않는다.
            # 과거: bash infra/cron/install.sh (VM 1 OCPU 부하로 비활성)
            echo ">>> Oracle VM deployment completed."

      - name: Collect Oracle VM disk usage
        if: ${{ always() }}
        id: disk_usage
        env:
          ORACLE_VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_VM_USERNAME: ${{ secrets.ORACLE_VM_USERNAME }}
          ORACLE_VM_SSH_KEY: ${{ secrets.ORACLE_VM_SSH_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/oracle_vm_key"
          printf '%s\n' "$ORACLE_VM_SSH_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          DISK_FREE=$(ssh -i "$KEY_PATH" -o StrictHostKeyChecking=no "$ORACLE_VM_USERNAME@$ORACLE_VM_HOST" "df -h / | awk 'NR==2 {print \$4}'" || true)
          DISK_USE=$(ssh -i "$KEY_PATH" -o StrictHostKeyChecking=no "$ORACLE_VM_USERNAME@$ORACLE_VM_HOST" "df -h / | awk 'NR==2 {print \$5}'" || true)
          echo "disk_free=${DISK_FREE:-unknown}" >> "$GITHUB_OUTPUT"
          echo "disk_use=${DISK_USE:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Checkout for version extraction
        uses: actions/checkout@v4

      - name: Extract APP_VERSION
        id: app_version
        run: |
          VERSION=$(python -c "from pathlib import Path; import re; content = Path('utils/logger.py').read_text(encoding='utf-8'); match = re.search(r'APP_VERSION\s*=\s*[\'\"]([^\'\"]+)[\'\"]', content); print(match.group(1) if match else '')")
          if [ -z "$VERSION" ]; then
            echo 'APP_VERSION not found' >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Notify Slack (deploy succeeded)
        if: ${{ success() }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Oracle VM (momentum-etf) 배포 완료 (branch: upgrade)\nAPP_VERSION: ${{ steps.app_version.outputs.version }}\nDISK_FREE: ${{ steps.disk_usage.outputs.disk_free }}\nDISK_USE: ${{ steps.disk_usage.outputs.disk_use }}\"}" \
            ${{ secrets.LOGS_SLACK_WEBHOOK }}

      - name: Notify Slack (deploy failed)
        if: ${{ failure() }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Oracle VM (momentum-etf) 배포 실패 (branch: upgrade)\nRepo: ${{ github.repository }}\nCommit: ${{ github.sha }}\nDISK_FREE: ${{ steps.disk_usage.outputs.disk_free }}\nDISK_USE: ${{ steps.disk_usage.outputs.disk_use }}\"}" \
            ${{ secrets.LOGS_SLACK_WEBHOOK }}

      - name: Notify Slack on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.LOGS_SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: "❌ GitHub Action Failed: ${{ github.workflow }}"
          SLACK_MESSAGE: "Job failed in ${{ github.repository }}! View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
