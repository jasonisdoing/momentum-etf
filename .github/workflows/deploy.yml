name: Deploy to Oracle VM

on:
  push:
    branches:
      - upgrade   # upgrade 브랜치에 push 시 자동 배포

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USERNAME }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            echo ">>> Connecting to Oracle VM and starting deployment..."
            cd ~/apps/momentum-etf
            # stale rename 유령 컨테이너 선별 제거
            #   이전 배포가 docker compose recreate 중간에 끊기면
            #   `<12hex>_momentum-etf-*` 형태의 리네임 유산이 남아 다음 배포에서
            #   "name is already in use" 충돌을 일으킴. 정상 컨테이너는 건드리지 않음.
            sudo docker ps -a --format '{{.ID}} {{.Names}}' \
              | awk '$2 ~ /^[0-9a-f]{12}_momentum-etf-/ { print $1 }' \
              | xargs -r sudo docker rm -f
            if [ ! -d .git ]; then
              git clone https://github.com/jasonisdoing/momentum-etf.git .
            else
              git fetch origin upgrade
              git reset --hard origin/upgrade
            fi
            sudo docker compose up -d --build --remove-orphans
            sudo docker image prune -af
            sudo docker builder prune -af
            # 마커 기반 idempotent crontab 설치 (타 앱 cron 항목 보존)
            bash infra/cron/install.sh
            echo ">>> Oracle VM deployment completed."

      - name: Collect Oracle VM disk usage
        if: ${{ always() }}
        id: disk_usage
        env:
          ORACLE_VM_HOST: ${{ secrets.ORACLE_VM_HOST }}
          ORACLE_VM_USERNAME: ${{ secrets.ORACLE_VM_USERNAME }}
          ORACLE_VM_SSH_KEY: ${{ secrets.ORACLE_VM_SSH_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/oracle_vm_key"
          printf '%s\n' "$ORACLE_VM_SSH_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          DISK_FREE=$(ssh -i "$KEY_PATH" -o StrictHostKeyChecking=no "$ORACLE_VM_USERNAME@$ORACLE_VM_HOST" "df -h / | awk 'NR==2 {print \$4}'" || true)
          DISK_USE=$(ssh -i "$KEY_PATH" -o StrictHostKeyChecking=no "$ORACLE_VM_USERNAME@$ORACLE_VM_HOST" "df -h / | awk 'NR==2 {print \$5}'" || true)
          echo "disk_free=${DISK_FREE:-unknown}" >> "$GITHUB_OUTPUT"
          echo "disk_use=${DISK_USE:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Extract APP_VERSION
        id: app_version
        run: |
          VERSION=$(python -c "from pathlib import Path; import re; content = Path('utils/logger.py').read_text(encoding='utf-8'); match = re.search(r'APP_VERSION\s*=\s*[\'\"]([^\'\"]+)[\'\"]', content); print(match.group(1) if match else '')")
          if [ -z "$VERSION" ]; then
            echo 'APP_VERSION not found' >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Notify Slack (deploy succeeded)
        if: ${{ success() }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Oracle VM (momentum-etf) 배포 완료 (branch: upgrade)\nAPP_VERSION: ${{ steps.app_version.outputs.version }}\nDISK_FREE: ${{ steps.disk_usage.outputs.disk_free }}\nDISK_USE: ${{ steps.disk_usage.outputs.disk_use }}\"}" \
            ${{ secrets.LOGS_SLACK_WEBHOOK }}

      - name: Notify Slack (deploy failed)
        if: ${{ failure() }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Oracle VM (momentum-etf) 배포 실패 (branch: upgrade)\nRepo: ${{ github.repository }}\nCommit: ${{ github.sha }}\nDISK_FREE: ${{ steps.disk_usage.outputs.disk_free }}\nDISK_USE: ${{ steps.disk_usage.outputs.disk_use }}\"}" \
            ${{ secrets.LOGS_SLACK_WEBHOOK }}

      - name: Notify Slack on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.LOGS_SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_TITLE: "❌ GitHub Action Failed: ${{ github.workflow }}"
          SLACK_MESSAGE: "Job failed in ${{ github.repository }}! View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
