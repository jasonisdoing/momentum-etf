services:
  node_app:
    build:
      context: .
      dockerfile: web/Dockerfile
    env_file:
      - .env
    volumes:
      - ./zaccounts:/app/zaccounts:ro
    restart: always

  hybrid_proxy:
    image: nginx:1.27-alpine
    depends_on:
      - node_app
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=etf.dojason.com
      - LETSENCRYPT_HOST=etf.dojason.com
      - LETSENCRYPT_EMAIL=kimwootak@catholic.ac.kr
      - TZ=Asia/Seoul
    volumes:
      - ./infra/hybrid/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
