services:
  mongodb:
    image: mongo:8.0
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWORD}
    volumes:
      - ./mongo-data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    restart: always

  fastapi_app:
    image: ghcr.io/jasonisdoing/momentum-etf-fastapi:latest
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - MONGO_DB_HOST=mongodb:27017
    volumes:
      - ./accounts.json:/app/accounts.json:ro
      # 정적 참조 데이터 (거래일 캘린더, 종목 리스트 등) — git 추적 제외, 서버에 직접 배치
      - ./data:/app/data:ro
      # cron 래퍼 hotfix 용 bind mount (이미지 재빌드 없이 반영)
      - ./infra/cron:/app/infra/cron:ro
      # cron 배치 로그 (호스트에서 tail 가능)
      - ./logs:/app/logs
    expose:
      - "8000"
    restart: always

  node_app:
    image: ghcr.io/jasonisdoing/momentum-etf-node:latest
    depends_on:
      - fastapi_app
      - mongodb
    env_file:
      - .env
    environment:
      - FASTAPI_INTERNAL_URL=http://fastapi_app:8000
      - MONGO_DB_HOST=mongodb:27017
    volumes:
      - ./accounts.json:/app/accounts.json:ro
      # 정적 참조 데이터 (거래일 캘린더 등) — fastapi_app 와 동일하게 bind-mount
      - ./data:/app/data:ro
    restart: always

  hybrid_proxy:
    image: nginx:1.27-alpine
    depends_on:
      - node_app
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=etf.dojason.com
      - LETSENCRYPT_HOST=etf.dojason.com
      - LETSENCRYPT_EMAIL=kimwootak@catholic.ac.kr
      - TZ=Asia/Seoul
    volumes:
      - ./infra/hybrid/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  # 배치 스케줄러 — infra/cron/crontab 을 단일 진실 소스로 APScheduler 가 큐에 enqueue.
  # fastapi 와 동일한 ghcr 이미지를 재사용하여 별도 빌드/푸시 없이 같은 배포 흐름에 편입.
  scheduler:
    image: ghcr.io/jasonisdoing/momentum-etf-fastapi:latest
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - APP_TYPE=Server
      - TZ=Asia/Seoul
      - MONGO_DB_HOST=mongodb:27017
    volumes:
      - ./accounts.json:/app/accounts.json:ro
      - ./data:/app/data
      - ./infra/cron:/app/infra/cron:ro
      - ./logs:/app/logs
    command: ["python", "-u", "infra/server_scheduler.py"]
    # 배포 시 진행 중인 배치(가격 캐시 등)가 끝날 때까지 SIGKILL 을 미룬다.
    # subprocess timeout(30분) 과 같은 기준 — 30분 안에 자연 종료 또는 timeout 으로 정리.
    stop_grace_period: 30m
    restart: unless-stopped
