services:
  fastapi_app:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    env_file:
      - .env
    volumes:
      - ./accounts.json:/app/accounts.json:ro
      # cron 래퍼 hotfix 용 bind mount (이미지 재빌드 없이 반영)
      - ./infra/cron:/app/infra/cron:ro
      # cron 배치 로그 (호스트에서 tail 가능)
      - ./logs:/app/logs
    expose:
      - "8000"
    restart: always

  node_app:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - fastapi_app
    env_file:
      - .env
    environment:
      - FASTAPI_INTERNAL_URL=http://fastapi_app:8000
    volumes:
      - ./accounts.json:/app/accounts.json:ro
    restart: always

  hybrid_proxy:
    image: nginx:1.27-alpine
    depends_on:
      - node_app
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=etf.dojason.com
      - LETSENCRYPT_HOST=etf.dojason.com
      - LETSENCRYPT_EMAIL=kimwootak@catholic.ac.kr
      - TZ=Asia/Seoul
    volumes:
      - ./infra/hybrid/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
