services:
  mongodb:
    image: mongo:8.0
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWORD}
    volumes:
      - ./mongo-data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    restart: always

  fastapi_app:
    image: ghcr.io/jasonisdoing/momentum-etf-fastapi:latest
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - MONGO_DB_HOST=mongodb
    volumes:
      - ./accounts.json:/app/accounts.json:ro
      # 정적 참조 데이터 (거래일 캘린더, 종목 리스트 등) — git 추적 제외, 서버에 직접 배치
      - ./data:/app/data:ro
      # cron 래퍼 hotfix 용 bind mount (이미지 재빌드 없이 반영)
      - ./infra/cron:/app/infra/cron:ro
      # cron 배치 로그 (호스트에서 tail 가능)
      - ./logs:/app/logs
    expose:
      - "8000"
    restart: always

  node_app:
    image: ghcr.io/jasonisdoing/momentum-etf-node:latest
    depends_on:
      - fastapi_app
      - mongodb
    env_file:
      - .env
    environment:
      - FASTAPI_INTERNAL_URL=http://fastapi_app:8000
      - MONGO_DB_HOST=mongodb
    volumes:
      - ./accounts.json:/app/accounts.json:ro
      # 정적 참조 데이터 (거래일 캘린더 등) — fastapi_app 와 동일하게 bind-mount
      - ./data:/app/data:ro
    restart: always

  hybrid_proxy:
    image: nginx:1.27-alpine
    depends_on:
      - node_app
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=etf.dojason.com
      - LETSENCRYPT_HOST=etf.dojason.com
      - LETSENCRYPT_EMAIL=kimwootak@catholic.ac.kr
      - TZ=Asia/Seoul
    volumes:
      - ./infra/hybrid/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
