services:
  fastapi_app:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    env_file:
      - .env
    volumes:
      - ./accounts.json:/app/accounts.json:ro
    expose:
      - "8000"
    restart: always

  node_app:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - fastapi_app
    env_file:
      - .env
    environment:
      - FASTAPI_INTERNAL_URL=http://fastapi_app:8000
    volumes:
      - ./accounts.json:/app/accounts.json:ro
    restart: unless-stopped

  hybrid_proxy:
    image: nginx:1.27-alpine
    depends_on:
      - node_app
    ports:
      - "8080:80"
    volumes:
      - ./infra/hybrid/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # 배치 스케줄러 — infra/cron/crontab 을 단일 진실 소스로 APScheduler 가 등록.
  # fastapi 와 동일한 ghcr 이미지를 재사용한다 (command 만 다름).
  # CI/CD 가 fastapi 이미지를 빌드/푸시할 때 같이 적용되므로 별도 build 단계 불필요.
  scheduler:
    image: ghcr.io/jasonisdoing/momentum-etf-fastapi:latest
    env_file:
      - .env
    environment:
      - APP_TYPE=Server
      - TZ=Asia/Seoul
    volumes:
      - ./accounts.json:/app/accounts.json:ro
      - ./logs:/app/logs   # 배치 로그를 호스트에 영구 저장
      - ./data:/app/data   # 캘린더/정적 데이터 공유
    command: ["python", "-u", "infra/server_scheduler.py"]
    restart: unless-stopped
